<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Training"/>
<title>My Training</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--card:#161616;--card2:#1e1e1e;--border:#2a2a2a;
  --accent:#c8ff00;--accentdim:rgba(200,255,0,0.1);--accentglow:rgba(200,255,0,0.2);
  --text:#f5f5f0;--muted:#666;--muted2:#2a2a2a;
  --red:#ff4455;--green:#00e5a0;--gold:#ffb830;--blue:#4fc3f7;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;}
::-webkit-scrollbar{display:none;}
input,select{font-family:'Nunito',sans-serif;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;width:100%;outline:none;}
input::placeholder{color:var(--muted);}
select option{background:var(--card);}
button{cursor:pointer;font-family:'Nunito',sans-serif;}
.bc{font-family:'Barlow Condensed',sans-serif;}
.screen{display:none;padding-bottom:100px;}
.screen.active{display:block;}
/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(13,13,13,0.95);border-top:1px solid var(--border);display:flex;backdrop-filter:blur(12px);z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;transition:color .15s;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}
/* CARDS */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;}
.card2{background:var(--card2);border-radius:12px;padding:12px 14px;}
/* BUTTONS */
.btn-primary{width:100%;background:var(--accent);color:#0d0d0d;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
.btn-ghost{background:none;color:var(--muted);border:1.5px dashed var(--muted2);border-radius:12px;padding:11px;font-size:14px;width:100%;margin-bottom:8px;}
.btn-tag{background:var(--accentdim);color:var(--accent);border:1px solid rgba(200,255,0,.25);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:flex-end;z-index:200;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:0 20px 48px;border:1px solid var(--border);border-bottom:none;}
.modal-handle{width:40px;height:4px;background:var(--muted2);border-radius:2px;margin:12px auto 16px;}
.label{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1.2px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row{display:flex;justify-content:space-between;align-items:center;}
/* HERO STRIP */
.hero{background:linear-gradient(135deg,#1a1f00 0%,#0d1200 100%);border-bottom:1px solid rgba(200,255,0,.15);padding:28px 20px 20px;}
/* PROGRESS RING */
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
/* STAT PILL */
.stat-pill{background:var(--card2);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--border);}
/* WEEK DAY */
.day-card{border-radius:14px;overflow:hidden;margin-bottom:12px;}
.day-header{background:var(--accent);color:#0d0d0d;padding:10px 16px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.ex-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card);}
.ex-row:last-child{border-bottom:none;}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards;}
</style>
</head>
<body>

<!-- ══ SCREENS ══════════════════════════════════════════════════════════════ -->

<!-- TODAY -->
<div id="screen-today" class="screen active">
  <div class="hero">
    <div style="font-size:11px;color:rgba(200,255,0,.6);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">Good work today 💪</div>
    <div id="hero-name" class="bc" style="font-size:36px;font-weight:900;line-height:1;margin-bottom:4px">Jordan Mills</div>
    <div id="hero-goal" style="font-size:13px;color:var(--muted)">Fat Loss · Week 4</div>
  </div>
  <div style="padding:20px">
    <!-- Today's workout card -->
    <div id="today-workout-card" style="margin-bottom:16px"></div>
    <!-- Quick stats -->
    <div id="today-stats" style="margin-bottom:16px"></div>
    <!-- Calories today -->
    <div id="today-cals-card" style="margin-bottom:16px"></div>
  </div>
</div>

<!-- PROGRAM -->
<div id="screen-program" class="screen">
  <div style="padding:24px 20px 0">
    <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">Your Program</div>
    <div id="program-title" class="bc" style="font-size:28px;font-weight:800;margin-bottom:20px"></div>
    <div id="program-body"></div>
  </div>
</div>

<!-- PROGRESS -->
<div id="screen-progress" class="screen">
  <div style="padding:24px 20px 0">
    <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">Your Progress</div>
    <div class="bc" style="font-size:28px;font-weight:800;margin-bottom:20px">Stats</div>
    <div id="progress-body"></div>
  </div>
</div>

<!-- FOOD -->
<div id="screen-food" class="screen">
  <div style="padding:24px 20px 0">
    <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">Nutrition</div>
    <div class="bc" style="font-size:28px;font-weight:800;margin-bottom:4px">Food Diary</div>
    <div id="food-header-row" class="row" style="margin-bottom:16px"></div>
    <div id="food-body"></div>
  </div>
</div>

<!-- LOG WORKOUT / ACTIVITY -->
<div id="screen-log" class="screen">
  <div style="padding:24px 20px 0">
    <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">Log</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button id="logtab-workout" onclick="setLogTab('workout')" style="padding:8px 20px;border-radius:20px;border:none;font-size:13px;font-weight:800;background:var(--accent);color:#0d0d0d">💪 Workout</button>
      <button id="logtab-activity" onclick="setLogTab('activity')" style="padding:8px 20px;border-radius:20px;border:none;font-size:13px;font-weight:800;background:var(--card2);color:var(--muted)">🏃 Activity</button>
    </div>
    <div id="log-body"></div>
  </div>
</div>

<!-- ACTIVITY LOG -->
<div id="modal-logActivity" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="bc" style="font-size:22px;font-weight:800;margin-bottom:16px">Log Activity</div>
    <label class="label">Activity Type</label>
    <select id="act-type" style="margin-bottom:12px;appearance:none" onchange="onActTypeChange()">
      <option value="steps">Steps</option>
      <option value="walk">Walk</option>
      <option value="run">Run</option>
      <option value="cycle">Cycling</option>
      <option value="swim">Swimming</option>
      <option value="hiit">HIIT</option>
      <option value="yoga">Yoga / Stretching</option>
      <option value="pilates">Pilates</option>
      <option value="boxing">Boxing</option>
      <option value="muaythai">Muay Thai</option>
      <option value="bjj">BJJ / Jiu Jitsu</option>
      <option value="mma">MMA</option>
      <option value="wrestling">Wrestling</option>
      <option value="football">Football / Soccer</option>
      <option value="basketball">Basketball</option>
      <option value="tennis">Tennis</option>
      <option value="golf">Golf</option>
      <option value="rowing">Rowing</option>
      <option value="crossfit">CrossFit</option>
      <option value="dance">Dance</option>
      <option value="hike">Hiking</option>
      <option value="ski">Skiing / Snowboarding</option>
      <option value="other">Other (type below)</option>
    </select>
    <div id="act-custom-row" style="display:none">
      <label class="label">What activity?</label>
      <input id="act-custom" placeholder="e.g. Rock climbing" style="margin-bottom:12px"/>
    </div>
    <div id="act-steps-row">
      <label class="label">Step Count</label>
      <input id="act-steps" type="number" placeholder="e.g. 8500" style="margin-bottom:12px"/>
    </div>
    <div id="act-detail-row" style="display:none">
      <label class="label">Notes (optional)</label>
      <input id="act-desc" placeholder="e.g. 5km, felt strong" style="margin-bottom:12px"/>
    </div>
    <label class="label">Duration (minutes)</label>
    <input id="act-duration" type="number" placeholder="e.g. 45" style="margin-bottom:12px"/>
    <label class="label">Calories Burned (optional)</label>
    <input id="act-cals" type="number" placeholder="e.g. 320" style="margin-bottom:20px"/>
    <button class="btn-primary" onclick="saveActivity()">Save Activity</button>
  </div>
</div>

<!-- ══ BOTTOM NAV ═══════════════════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goTo('today')" id="nav-today">
    <span class="nav-icon">⚡</span>Today
  </button>
  <button class="nav-btn" onclick="goTo('program')" id="nav-program">
    <span class="nav-icon">📋</span>Program
  </button>
  <button class="nav-btn" onclick="goTo('progress')" id="nav-progress">
    <span class="nav-icon">📈</span>Progress
  </button>
  <button class="nav-btn" onclick="goTo('food')" id="nav-food">
    <span class="nav-icon">🥗</span>Food
  </button>
  <button class="nav-btn" onclick="goTo('log')" id="nav-log">
    <span class="nav-icon">➕</span>Log
  </button>
</nav>

<!-- ══ MODALS ════════════════════════════════════════════════════════════════ -->
<div id="modal-logFood" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="bc" style="font-size:22px;font-weight:800;margin-bottom:6px">Log Food</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Just type what you ate and how many grams — we'll work out the rest.</div>

    <label class="label">Meal</label>
    <select id="lf-meal" style="margin-bottom:14px;appearance:none">
      <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
      <option>Snacks</option><option>Pre-Workout</option><option>Post-Workout</option>
    </select>

    <label class="label">What did you eat? (one item per line)</label>
    <textarea id="lf-item" placeholder="chicken breast 150g&#10;white rice 180g&#10;broccoli 100g&#10;olive oil 10g&#10;mixed seasoning 5g" style="font-family:'Nunito',sans-serif;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;width:100%;outline:none;resize:none;height:130px;line-height:1.6;margin-bottom:8px"></textarea>
    <button id="btn-ai-lookup" class="btn-primary" onclick="aiLookup()" style="margin-bottom:16px">Calculate Nutrition ✦</button>

    <!-- AI result preview — hidden until calculated -->
    <div id="lf-result" style="display:none">
      <div style="background:var(--accentdim);border:1px solid rgba(200,255,0,.2);border-radius:14px;padding:14px;margin-bottom:16px">
        <div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">✦ Calculated Nutrition</div>
        <div id="lf-result-name" style="font-size:15px;font-weight:800;margin-bottom:10px"></div>
        <div class="grid2" style="margin-bottom:10px">
          <div class="card2" style="text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--accent)" id="lf-r-cals">—</div>
            <div style="font-size:10px;color:var(--muted)">kcal</div>
          </div>
          <div class="card2" style="text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--blue)" id="lf-r-p">—</div>
            <div style="font-size:10px;color:var(--muted)">protein g</div>
          </div>
          <div class="card2" style="text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--gold)" id="lf-r-c">—</div>
            <div style="font-size:10px;color:var(--muted)">carbs g</div>
          </div>
          <div class="card2" style="text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--green)" id="lf-r-f">—</div>
            <div style="font-size:10px;color:var(--muted)">fat g</div>
          </div>
        </div>
        <div id="lf-r-micros" style="font-size:11px;color:var(--muted);line-height:1.8"></div>
      </div>
      <button class="btn-primary" onclick="saveFood()">Add to Diary ✓</button>
    </div>

    <div id="lf-error" style="display:none;color:var(--red);font-size:13px;margin-top:8px;text-align:center"></div>
  </div>
</div>

<div id="modal-logWeight" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="bc" style="font-size:22px;font-weight:800;margin-bottom:16px">Log Weight</div>
    <label class="label">Your weight today (kg)</label>
    <input id="lw-val" type="number" step="0.1" placeholder="e.g. 82.5" style="margin-bottom:24px"/>
    <button class="btn-primary" onclick="saveWeight()">Save</button>
  </div>
</div>

// ─── UTILS ───────────────────────────────────────────────────────────────────
function fmtToday(){return new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function openModal(id){document.getElementById("modal-"+id).classList.add("open");}
function closeModal(id){document.getElementById("modal-"+id).classList.remove("open");}
function goTo(screen){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("screen-"+screen).classList.add("active");
  document.getElementById("nav-"+screen).classList.add("active");
  window.scrollTo(0,0);
  if(screen==="today") renderToday();
  if(screen==="program") renderProgram();
  if(screen==="progress") renderProgress();
  if(screen==="food") renderFood();
  if(screen==="log") renderLog();
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function lineChart(data,color="#c8ff00",h=80){
  if(!data||data.length<2)return`<div style="color:var(--muted);font-size:13px;padding:8px 0">Log more entries to see your trend.</div>`;
  const vals=data.map(d=>d.val),min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const W=300,H=h,pts=data.map((d,i)=>[(i/(data.length-1))*(W-24)+12,H-((d.val-min)/rng)*(H-24)-12]);
  const trend=vals[vals.length-1]-vals[0];
  const gid="g"+color.replace(/[^a-z0-9]/gi,"");
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
  <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
  <polygon fill="url(#${gid})" points="${[...pts.map(p=>p.join(",")),`${pts[pts.length-1][0]},${H}`,`${pts[0][0]},${H}`].join(" ")}"/>
  <polyline fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${pts.map(p=>p.join(",")).join(" ")}"/>
  ${pts.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="var(--bg)" stroke-width="2"/>`).join("")}
  </svg>
  <div style="display:flex;justify-content:space-between;margin-top:4px">
    <span style="font-size:11px;color:var(--muted)">${data[0].date}</span>
    <span style="font-size:13px;font-weight:800;color:${trend<=0?"var(--green)":"var(--red)"}">${trend>0?"+":""}${trend.toFixed(1)} kg</span>
    <span style="font-size:11px;color:var(--muted)">${data[data.length-1].date}</span>
  </div>`;
}

function macroBar(label,val,tgt,color){
  const pct=Math.min(100,tgt?Math.round(val/tgt*100):0);
  return`<div class="card2">
    <div class="row" style="margin-bottom:6px">
      <span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">${label}</span>
      <span style="font-size:13px;font-weight:800;color:${color}">${val}g</span>
    </div>
    <div style="background:var(--muted2);border-radius:4px;height:5px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px">${pct}% of ${tgt}g</div>
  </div>`;
}


// ─── MICROS TODAY HELPER ─────────────────────────────────────────────────────
function renderMicrosToday(day){
  if(!day||!day.micros) return "";
  const hasMicros=MICROS.some(k=>(day.micros[k]||0)>0);
  if(!hasMicros) return "";
  let html='<div style="margin-top:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px">Micronutrients Today</div><div class="grid2">';
  MICROS.forEach(k=>{
    const val=day.micros[k]||0;
    if(!val) return;
    const tgt=DEFAULT_MICRO_TGTS[k];
    const pct=Math.min(100,Math.round(val/tgt*100));
    const col=MICRO_COLORS[k];
    html+=`<div class="card2">
      <div class="row" style="margin-bottom:5px">
        <span style="font-size:10px;color:var(--muted)">${MICRO_LABELS[k]}</span>
        <span style="font-size:11px;font-weight:800;color:${col}">${val}<span style="font-weight:400;color:var(--muted)"> ${MICRO_UNITS[k]}</span></span>
      </div>
      <div style="background:var(--muted2);border-radius:4px;height:4px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${col};border-radius:4px"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">${pct}% of ${tgt}</div>
    </div>`;
  });
  html+='</div></div>';
  return html;
}

// Smart emoji for free-text custom activities
function smartEmoji(text){
  if(!text) return "🏅";
  const t = text.toLowerCase();
  if(/jiu.?jitsu|bjj|grappl/i.test(t)) return "🥋";
  if(/box|punch|spar/i.test(t)) return "🥊";
  if(/muay|thai|kickbox/i.test(t)) return "🥋";
  if(/mma|martial/i.test(t)) return "🥋";
  if(/wrestl/i.test(t)) return "🤼";
  if(/run|jog|sprint/i.test(t)) return "🏃";
  if(/walk|stroll/i.test(t)) return "🚶";
  if(/cycl|bike|bik/i.test(t)) return "🚴";
  if(/swim|pool/i.test(t)) return "🏊";
  if(/yoga/i.test(t)) return "🧘";
  if(/pilates/i.test(t)) return "🤸";
  if(/crossfit/i.test(t)) return "🏋️";
  if(/lift|weight|gym|squat|deadlift|bench/i.test(t)) return "🏋️";
  if(/hiit|circuit/i.test(t)) return "🔥";
  if(/football|soccer/i.test(t)) return "⚽";
  if(/basketball/i.test(t)) return "🏀";
  if(/tennis/i.test(t)) return "🎾";
  if(/golf/i.test(t)) return "⛳";
  if(/row|kayak|canoe/i.test(t)) return "🚣";
  if(/hike|trek|climb/i.test(t)) return "🥾";
  if(/ski|snow|board/i.test(t)) return "⛷️";
  if(/dance|zumba/i.test(t)) return "💃";
  if(/stretch|mobil|foam/i.test(t)) return "🧘";
  if(/surf|skate/i.test(t)) return "🏄";
  if(/rugby|AFL|cricket|base/i.test(t)) return "🏉";
  if(/badminton|squash|racquet/i.test(t)) return "🏸";
  if(/volley/i.test(t)) return "🏐";
  if(/step/i.test(t)) return "👟";
  return "🏅";
}

            <div style="font-size:15px;font-weight:800">${a.label||ACT_LABELS[a.type]||a.type}${a.desc?" — "+a.desc:""}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${a.date}</div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${a.type==="steps"?`<div class="bc" style="font-size:20px;font-weight:800;color:var(--accent)">${(+a.steps).toLocaleString()}</div><div style="font-size:10px;color:var(--muted)">steps</div>`:""}
          ${a.duration?`<div style="font-size:13px;font-weight:700;color:var(--text)">${a.duration} min</div>`:""}
          ${a.cals?`<div style="font-size:11px;color:var(--red)">🔥 ${a.cals} kcal</div>`:""}
        </div>
      </div>
    </div>`).join("") : `<div style="text-align:center;color:var(--muted);padding:30px 0;font-size:14px">No activity logged yet.</div>`;

  // Steps chart if enough data
  const stepsData = clientActivity.filter(a=>a.type==="steps"&&a.steps).map(a=>({date:a.date,val:+a.steps})).reverse();
  const stepsChart = stepsData.length>=2 ? `<div class="card" style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Daily Steps</div>
    ${lineChart(stepsData,"#c8ff00",70)}
  </div>` : "";

  // Weekly activity summary
  const totalMins = clientActivity.reduce((s,a)=>s+(+a.duration||0),0);
  const totalCals = clientActivity.reduce((s,a)=>s+(+a.cals||0),0);
  const latestSteps = clientActivity.find(a=>a.type==="steps");

  document.getElementById("log-body").innerHTML=`
    <button class="btn-primary" onclick="openActivityModal()" style="margin-bottom:16px">+ Log Activity</button>
    ${latestSteps||totalMins?`<div class="grid2" style="grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
      ${latestSteps?`<div class="stat-pill"><div class="bc" style="font-size:20px;font-weight:800;color:var(--accent)">${(+latestSteps.steps).toLocaleString()}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">Steps today</div></div>`:"<div></div>"}
      <div class="stat-pill"><div class="bc" style="font-size:20px;font-weight:800;color:var(--gold)">${totalMins}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">Total mins</div></div>
      <div class="stat-pill"><div class="bc" style="font-size:20px;font-weight:800;color:var(--red)">${totalCals.toLocaleString()}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px">kcal burned</div></div>
    </div>`:""}
    ${stepsChart}
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">Activity History</div>
    ${history}`;
}

function onActTypeChange(){
  const val=document.getElementById("act-type").value;
  const isSteps=val==="steps";
  const isOther=val==="other";
  document.getElementById("act-steps-row").style.display=isSteps?"block":"none";
  document.getElementById("act-detail-row").style.display=isSteps?"none":"block";
  document.getElementById("act-custom-row").style.display=isOther?"block":"none";
}

function openActivityModal(){
  openModal("logActivity");
  onActTypeChange();
}

function saveActivity(){
  const type=document.getElementById("act-type").value;
  const custom=document.getElementById("act-custom").value.trim();
  const finalType=type==="other"&&custom?custom.toLowerCase().replace(/\s+/g,"-"):type;
  const displayLabel=type==="other"&&custom?custom:(ACT_LABELS[type]||type);
  const emoji=type==="other"&&custom?smartEmoji(custom):ACT_ICONS[type]||"🏅";
  const entry={
    date:fmtToday(),
    type:finalType,
    emoji,
    label:displayLabel,
    steps:type==="steps"?document.getElementById("act-steps").value:"",
    desc:document.getElementById("act-desc").value.trim(),
    duration:document.getElementById("act-duration").value,
    cals:document.getElementById("act-cals").value,
  };
  clientActivity.unshift(entry);
  ["act-steps","act-desc","act-duration","act-cals","act-custom"].forEach(id=>{document.getElementById(id).value="";});
  closeModal("logActivity");
  renderActivityLog();
}

// which week/day is selected in the log screen
let selWeek=0, selDay=0;

function renderLog(){
  const weeks=DATA.program.weeks;
  // Week selector tabs
  const weekTabs=weeks.map((w,i)=>
    `<button onclick="selWeek=${i};selDay=0;renderLog()" style="padding:7px 16px;border-radius:20px;border:none;font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap;background:${i===selWeek?"var(--accent)":"var(--card2)"};color:${i===selWeek?"#0d0d0d":"var(--muted)"}">Week ${w.weekNum}</button>`
  ).join("");

  const week=weeks[selWeek];
  // Day selector tabs
  const dayTabs=week.days.map((d,i)=>
    `<button onclick="selDay=${i};renderLog()" style="padding:7px 14px;border-radius:20px;border:none;font-size:11px;font-weight:700;flex-shrink:0;white-space:nowrap;background:${i===selDay?"var(--card2)":"var(--card2)"};color:${i===selDay?"var(--accent)":"var(--muted)"};border:${i===selDay?"1.5px solid var(--accent)":"1.5px solid var(--border)"}">${d.dayLabel}</button>`
  ).join("");

  const day=week.days[selDay];

  // Build exercise rows pre-filled with expected values
  const exRows=day.exercises.map((ex,i)=>`
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:15px;font-weight:800">${ex.name}</div>
          ${ex.notes?`<div style="font-size:11px;color:var(--muted);margin-top:2px">📝 ${ex.notes}</div>`:""}
        </div>
        <div style="background:var(--accentdim);border:1px solid rgba(200,255,0,.2);border-radius:10px;padding:5px 10px;text-align:right;flex-shrink:0;margin-left:10px">
          <div style="font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.8px">Target</div>
          <div style="font-size:13px;font-weight:800;color:var(--accent)">${ex.sets}×${ex.reps}${ex.weight?" @ "+ex.weight+"kg":""}</div>
          ${ex.rpe?`<div style="font-size:10px;color:rgba(200,255,0,.6)">RPE ${ex.rpe}</div>`:""}
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">What you actually did:</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div>
          <div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px">Sets</div>
          <input id="lex-sets-${i}" type="number" placeholder="${ex.sets}" value="${ex.sets}" style="text-align:center;padding:10px 4px;font-size:15px;font-weight:700;background:var(--card2)"/>
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px">Reps</div>
          <input id="lex-reps-${i}" type="number" placeholder="${ex.reps}" value="${ex.reps}" style="text-align:center;padding:10px 4px;font-size:15px;font-weight:700;background:var(--card2)"/>
        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);text-align:center;margin-bottom:4px">Weight (kg)</div>
          <input id="lex-weight-${i}" type="number" placeholder="${ex.weight||0}" value="${ex.weight||""}" style="text-align:center;padding:10px 4px;font-size:15px;font-weight:700;background:var(--card2)"/>
        </div>
      </div>
    </div>`).join("");

  document.getElementById("log-body").innerHTML=`
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none">${weekTabs}</div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;-webkit-overflow-scrolling:touch;scrollbar-width:none">${dayTabs}</div>
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">${day.dayLabel} — ${week.weekNum===1?"Week 1":"Week "+week.weekNum}</div>
    ${exRows}
    <button class="btn-primary" onclick="saveSession()">Save Session 💪</button>`;
}

function saveSession(){
  const week=DATA.program.weeks[selWeek];
  const day=week.days[selDay];
  const exercises=day.exercises.map((ex,i)=>({
    name:ex.name,
    sets:+document.getElementById(`lex-sets-${i}`).value||ex.sets,
    reps:+document.getElementById(`lex-reps-${i}`).value||ex.reps,
    weight:+document.getElementById(`lex-weight-${i}`).value||ex.weight||0,
    rpe:""
  }));
  clientSessions.unshift({date:fmtToday(),day:day.dayLabel,week:"Week "+week.weekNum,exercises});
  document.getElementById("log-body").innerHTML=`
    <div style="text-align:center;padding:48px 20px">
      <div style="font-size:64px;margin-bottom:16px">💪</div>
      <div class="bc" style="font-size:32px;font-weight:900;color:var(--accent);margin-bottom:8px">Session Saved!</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:6px">${day.dayLabel}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:28px">${exercises.length} exercises logged</div>
      <button class="btn-primary" onclick="goTo('progress')">View Progress</button>
    </div>`;
}

// ─── SAVE FOOD ────────────────────────────────────────────────────────────────
// Stores the AI-calculated nutrition result before saving
let pendingFood = null;

async function aiLookup(){
  const items = document.getElementById("lf-item").value.trim();
  const errEl = document.getElementById("lf-error");
  const resultEl = document.getElementById("lf-result");
  const btn = document.getElementById("btn-ai-lookup");

  errEl.style.display="none";
  resultEl.style.display="none";
  pendingFood=null;

  if(!items){ errEl.textContent="Please enter at least one food item."; errEl.style.display="block"; return; }

  btn.textContent="Calculating…";
  btn.disabled=true;
  btn.style.opacity="0.7";

  try {
    const prompt = `You are a nutrition database. The user has listed several food items with gram amounts. Calculate the COMBINED total nutrition for the entire meal and return ONLY a JSON object with these exact keys:
{
  "name": "a short readable summary of the meal e.g. 'Chicken, Rice & Veg'",
  "cals": number,
  "protein": number,
  "carbs": number,
  "fat": number,
  "vitc": number (mg),
  "vitd": number (mcg),
  "iron": number (mg),
  "calcium": number (mg),
  "mag": number (mg),
  "zinc": number (mg),
  "potassium": number (mg),
  "sodium": number (mg),
  "fibre": number (g),
  "omega3": number (mg)
}

Food items:
${items}

Return ONLY the JSON. No explanation. Round all numbers to 1 decimal place.`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user", content:prompt}]
      })
    });

    const data = await res.json();
    const text = data.content[0].text.trim();
    const clean = text.replace(/```json|```/g,"").trim();
    const n = JSON.parse(clean);

    pendingFood = {
      item: n.name,
      cals: n.cals||0, p: n.protein||0, c: n.carbs||0, f: n.fat||0,
      vitc:n.vitc||0, vitd:n.vitd||0, iron:n.iron||0, calcium:n.calcium||0,
      mag:n.mag||0, zinc:n.zinc||0, potassium:n.potassium||0,
      sodium:n.sodium||0, fibre:n.fibre||0, omega3:n.omega3||0
    };

    document.getElementById("lf-result-name").textContent = n.name;
    document.getElementById("lf-r-cals").textContent = n.cals;
    document.getElementById("lf-r-p").textContent = (n.protein||0)+"g";
    document.getElementById("lf-r-c").textContent = (n.carbs||0)+"g";
    document.getElementById("lf-r-f").textContent = (n.fat||0)+"g";

    const microLines = MICROS
      .filter(k=>pendingFood[k]>0)
      .map(k=>`<span style="margin-right:12px">${MICRO_LABELS[k]}: <strong style="color:var(--text)">${pendingFood[k]} ${MICRO_UNITS[k]}</strong></span>`)
      .join("");
    document.getElementById("lf-r-micros").innerHTML = microLines || "<span>No significant micronutrients</span>";

    resultEl.style.display="block";

  } catch(e) {
    errEl.textContent="Couldn't calculate nutrition — check your connection and try again.";
    errEl.style.display="block";
  }

  btn.textContent="Calculate Nutrition ✦";
  btn.disabled=false;
  btn.style.opacity="1";
}

function saveFood(){
  if(!pendingFood) return;
  const meal=document.getElementById("lf-meal").value;
  const today=fmtToday();
  let day=clientFood.find(d=>d.date===today);
  if(!day){
    day={date:today,cals:0,protein:0,carbs:0,fat:0,micros:Object.fromEntries(MICROS.map(k=>[k,0])),meals:[{name:"Breakfast",foods:[]},{name:"Lunch",foods:[]},{name:"Dinner",foods:[]},{name:"Snacks",foods:[]}]};
    clientFood.unshift(day);
  }
  let mealObj=day.meals.find(m=>m.name===meal);
  if(!mealObj){mealObj={name:meal,foods:[]};day.meals.push(mealObj);}
  mealObj.foods.push(pendingFood);
  const all=day.meals.flatMap(m=>m.foods);
  day.cals=Math.round(all.reduce((s,f)=>s+f.cals,0));
  day.protein=Math.round(all.reduce((s,f)=>s+f.p,0));
  day.carbs=Math.round(all.reduce((s,f)=>s+f.c,0));
  day.fat=Math.round(all.reduce((s,f)=>s+f.f,0));
  if(!day.micros) day.micros=Object.fromEntries(MICROS.map(k=>[k,0]));
  MICROS.forEach(k=>{day.micros[k]=Math.round(all.reduce((s,f)=>s+(f[k]||0),0));});
  // Reset modal
  document.getElementById("lf-item").value="";
  document.getElementById("lf-result").style.display="none";
  document.getElementById("lf-error").style.display="none";
  pendingFood=null;
  closeModal("logFood");
  renderFood();
  if(document.getElementById("screen-today").classList.contains("active")) renderToday();
}
