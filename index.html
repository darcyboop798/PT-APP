<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#070710"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Darcy's PT"/>
<title>Darcy's PT — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --bg:#070710;--card:#0f0f1a;--card2:#161625;--border:#1f1f35;
  --accent:#6ee7ff;--gold:#ffd166;--green:#06d6a0;--red:#ef476f;
  --text:#eeeef5;--muted:#5a5a7a;--muted2:#3a3a55;--purple:#a78bfa;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}
input,select,textarea{font-family:'Nunito',sans-serif;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;width:100%;outline:none;}
input::placeholder,textarea::placeholder{color:var(--muted2);}
select option{background:var(--card);}
button{cursor:pointer;font-family:'Nunito',sans-serif;}
.syne{font-family:'Syne',sans-serif;}
.screen{display:none;padding-bottom:60px;}
.screen.active{display:block;}
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;}
.card2{background:var(--card2);border-radius:12px;padding:12px 14px;}
.btn-primary{width:100%;background:var(--accent);color:#050510;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;font-family:'Syne',sans-serif;}
.btn-ghost{background:none;color:var(--muted);border:1.5px dashed var(--muted2);border-radius:12px;padding:11px;font-size:14px;width:100%;margin-bottom:8px;}
.btn-tag{background:rgba(110,231,255,.08);color:var(--accent);border:1px solid rgba(110,231,255,.27);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;}
.tab-btn{padding:6px 12px;border-radius:20px;border:none;font-size:11px;font-weight:700;text-transform:capitalize;flex-shrink:0;background:var(--card2);color:var(--muted);white-space:nowrap;}
.tab-btn.active{background:var(--accent);color:#050510;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:flex-end;z-index:200;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:0 20px 48px;border:1px solid var(--border);border-bottom:none;}
.modal-handle{width:40px;height:4px;background:var(--muted2);border-radius:2px;margin:12px auto 14px;}
.label{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1.2px;}
.row{display:flex;justify-content:space-between;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:700;}
.unread-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;margin-left:4px;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen active" style="padding:0">
  <div style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:40px 24px;">
    <div style="text-align:center;margin-bottom:40px">
      <div style="font-size:48px;margin-bottom:12px">💪</div>
      <div class="syne" style="font-size:32px;font-weight:800">Darcy's PT</div>
      <div style="font-size:14px;color:var(--muted);margin-top:4px">Coach Dashboard</div>
    </div>
    <label class="label">Password</label>
    <input id="login-pw" type="password" placeholder="Enter your password" style="margin-bottom:16px" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div id="login-err" style="color:var(--red);font-size:13px;text-align:center;margin-top:12px;display:none">Incorrect password</div>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen">
  <div style="padding:28px 20px 0">
    <div class="row" style="margin-bottom:6px">
      <div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase">Darcy's PT</div>
        <div class="syne" style="font-size:28px;font-weight:800">Dashboard</div>
      </div>
      <button id="btn-add-client" style="background:var(--accent);color:#050510;border:none;border-radius:50%;width:44px;height:44px;font-size:24px;font-weight:800">+</button>
    </div>
    <div id="home-stats" class="grid2" style="grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px"></div>
    <!-- AI Insights -->
    <div id="ai-insights-card" style="margin-bottom:16px"></div>
    <!-- Unread messages -->
    <div id="unread-messages-card" style="margin-bottom:16px"></div>
    <!-- Upcoming bookings -->
    <div id="upcoming-bookings-card" style="margin-bottom:16px"></div>
  </div>
  <div id="client-list" style="padding:0 20px;display:flex;flex-direction:column;gap:12px"></div>
</div>

<!-- CLIENT SCREEN -->
<div id="screen-client" class="screen">
  <div style="padding:20px 20px 0;background:var(--bg)">
    <button id="btn-back-home" style="background:none;border:none;color:var(--muted);font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:6px">← All Clients</button>
    <div class="row" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:14px;flex:1">
        <div id="client-avatar-big" style="width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0"></div>
        <div><div id="client-name-big" class="syne" style="font-size:22px;font-weight:800"></div><div id="client-meta-big" style="font-size:13px;color:var(--muted)"></div></div>
      </div>
      <button id="btn-msg-client" class="btn-tag" style="font-size:12px">💬</button>
    </div>
    <div class="tabs" id="client-tabs"></div>
  </div>
  <div id="client-tab-content" style="padding:0 20px;margin-top:8px"></div>
</div>

<!-- BOOKINGS SCREEN -->
<div id="screen-bookings" class="screen">
  <div style="padding:24px 20px 0">
    <button onclick="showScreen('home')" style="background:none;border:none;color:var(--muted);font-size:14px;margin-bottom:14px">← Back</button>
    <div class="syne" style="font-size:26px;font-weight:800;margin-bottom:20px">📅 Bookings</div>
    <div id="bookings-body"></div>
  </div>
</div>

<!-- MESSAGES SCREEN -->
<div id="screen-messages" class="screen">
  <div style="padding:24px 20px 0">
    <button onclick="showScreen('home')" style="background:none;border:none;color:var(--muted);font-size:14px;margin-bottom:14px">← Back</button>
    <div class="syne" style="font-size:26px;font-weight:800;margin-bottom:20px">💬 Messages</div>
    <div id="messages-body"></div>
  </div>
</div>

<!-- PROGRAM EDITOR SCREEN -->
<div id="screen-program" class="screen">
  <div style="padding:0 20px 14px;background:var(--bg);border-bottom:1px solid var(--border)">
    <button id="btn-back-client-prog" style="background:none;border:none;color:var(--muted);font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-top:14px">← Back</button>
    <div class="row">
      <div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase">Program Editor</div>
        <div id="prog-editor-name" class="syne" style="font-size:20px;font-weight:800"></div>
      </div>
      <button id="btn-save-program" class="btn-primary" style="width:auto;padding:10px 20px;font-size:14px">Save ✓</button>
    </div>
  </div>
  <div id="program-editor-body" style="padding:16px 20px 0"></div>
</div>

<!-- MODALS -->
<div id="modal-addClient" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">New Client</div>
    <label class="label">Full Name</label>
    <input id="inp-client-name" placeholder="e.g. Jordan Mills" style="margin-bottom:12px"/>
    <label class="label">Email</label>
    <input id="inp-client-email" type="email" placeholder="jordan@email.com" style="margin-bottom:12px"/>
    <label class="label">Goal</label>
    <select id="inp-client-goal" style="margin-bottom:12px;appearance:none">
      <option>Fat Loss</option><option>Muscle Gain</option><option>Strength</option>
      <option>Endurance</option><option>General Fitness</option><option>Rehab</option><option>Body Recomp</option>
    </select>
    <label class="label">Calorie Target</label>
    <input id="inp-client-cals" type="number" placeholder="e.g. 2000" style="margin-bottom:12px"/>
    <label class="label">Protein Target (g)</label>
    <input id="inp-client-protein" type="number" placeholder="e.g. 150" style="margin-bottom:20px"/>
    <button class="btn-primary" onclick="addClient()">Add Client</button>
  </div>
</div>

<div id="modal-addWeight" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Log Weight</div>
    <label class="label">Weight (kg)</label>
    <input id="inp-weight" type="number" step="0.1" placeholder="e.g. 82.5" style="margin-bottom:24px"/>
    <button class="btn-primary" onclick="saveWeight()">Save</button>
  </div>
</div>

<div id="modal-addMeasure" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Log Measurements</div>
    <div class="grid2" style="margin-bottom:20px">
      <div><label class="label">Chest (cm)</label><input id="inp-chest" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Waist (cm)</label><input id="inp-waist" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Hips (cm)</label><input id="inp-hips" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Arms (cm)</label><input id="inp-arms" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Thighs (cm)</label><input id="inp-thighs" type="number" step="0.5" placeholder="0"/></div>
    </div>
    <button class="btn-primary" onclick="saveMeasure()">Save</button>
  </div>
</div>

<div id="modal-addNote" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Add Note</div>
    <label class="label">Note</label>
    <textarea id="inp-note" placeholder="e.g. Jordan's left knee is playing up — avoid heavy squats next week" style="margin-bottom:20px;height:120px;resize:none"></textarea>
    <button class="btn-primary" onclick="saveNote()">Save Note</button>
  </div>
</div>

<div id="modal-sendMessage" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Send Message</div>
    <label class="label">Message</label>
    <textarea id="inp-message" placeholder="Type your message..." style="margin-bottom:20px;height:120px;resize:none"></textarea>
    <button class="btn-primary" onclick="sendMessage()">Send</button>
  </div>
</div>

<div id="modal-addProgram" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">New Program</div>
    <label class="label">Program Name</label>
    <input id="inp-prog-name" placeholder="e.g. Phase 1 – Fat Loss" style="margin-bottom:12px"/>
    <label class="label">Start Month</label>
    <select id="inp-prog-month" style="margin-bottom:12px;appearance:none"></select>
    <label class="label">Save as Template?</label>
    <select id="inp-prog-template" style="margin-bottom:20px;appearance:none">
      <option value="0">No — just for this client</option>
      <option value="1">Yes — save as reusable template</option>
    </select>
    <button class="btn-primary" onclick="createProgram()">Create Program</button>
  </div>
</div>

<div id="modal-addCue" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:4px">Form Cues</div>
    <div id="cue-exercise-name" style="font-size:14px;color:var(--accent);margin-bottom:16px"></div>
    <div id="existing-cues" style="margin-bottom:16px"></div>
    <label class="label">Add New Cue</label>
    <input id="inp-cue" placeholder="e.g. Knees tracking over toes" style="margin-bottom:12px"/>
    <label class="label">Client-specific?</label>
    <select id="inp-cue-specific" style="margin-bottom:16px;appearance:none">
      <option value="0">No — generic cue for all clients</option>
      <option value="1">Yes — only for this client</option>
    </select>
    <button class="btn-primary" onclick="saveCue()">Add Cue</button>
  </div>
</div>

<div id="modal-formVideos" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:4px">Form Videos</div>
    <div id="fv-exercise-name" style="font-size:14px;color:var(--accent);margin-bottom:16px"></div>
    <div id="fv-list"></div>
  </div>
</div>

<div id="modal-availability" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Set Availability</div>
    <div id="availability-body"></div>
    <button class="btn-primary" style="margin-top:16px" onclick="saveAvailability()">Save Availability</button>
  </div>
</div>

<script>
// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(
  'https://nkzgtzlpwhbpuaislkeo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5remd0emxwd2hicHVhaXNsa2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzk0MzMsImV4cCI6MjA4ODg1NTQzM30.q7n1CUgH88Ke8YSyHhr7RmmwZpkt-_3zKJ9OlhYRjQw'
);

// ─── AUTH ─────────────────────────────────────────────────────────────────────
const PT_PASSWORD = 'PTAdmin#9K2x';
let authed = false;

function doLogin(){
  const pw = document.getElementById('login-pw').value;
  if(pw === PT_PASSWORD){
    authed = true;
    showScreen('home');
    loadHome();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let clients = [];
let selClientId = null;
let selTab = 'workouts';
let editProg = null;
let cueExerciseName = '';
let fvExerciseName = '';
const AVATAR_COLORS = ['#6ee7ff','#ffd166','#06d6a0','#ef476f','#a78bfa','#fb923c'];
const GOALS = ['Fat Loss','Muscle Gain','Strength','Endurance','General Fitness','Rehab','Body Recomp'];
const MICROS = ['vitc','vitd','iron','calcium','mag','zinc','potassium','sodium','fibre','omega3'];
const MICRO_LABELS = {vitc:'Vit C',vitd:'Vit D',iron:'Iron',calcium:'Calcium',mag:'Magnesium',zinc:'Zinc',potassium:'Potassium',sodium:'Sodium',fibre:'Fibre',omega3:'Omega-3'};
const MICRO_UNITS = {vitc:'mg',vitd:'mcg',iron:'mg',calcium:'mg',mag:'mg',zinc:'mg',potassium:'mg',sodium:'mg',fibre:'g',omega3:'mg'};
const MICRO_COLORS = {vitc:'#ff6b6b',vitd:'#ffd166',iron:'#ef476f',calcium:'#6ee7ff',mag:'#06d6a0',zinc:'#a78bfa',potassium:'#fb923c',sodium:'#f72585',fibre:'#4cc9f0',omega3:'#c8ff00'};
const DEFAULT_MICRO_TGTS = {vitc:90,vitd:20,iron:18,calcium:1000,mag:400,zinc:11,potassium:3500,sodium:2300,fibre:30,omega3:1000};
const DAYS_OF_WEEK = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ─── UTILS ────────────────────────────────────────────────────────────────────
function fmtToday(){return new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function monthLabel(ym){if(!ym)return'';const[y,m]=ym.split('-');return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});}
function allMonths(){const a=[],n=new Date();for(let i=-2;i<=18;i++){const d=new Date(n.getFullYear(),n.getMonth()+i,1);a.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}return a;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0);}
function openModal(id){document.getElementById('modal-'+id).classList.add('open');}
function closeModal(id){document.getElementById('modal-'+id).classList.remove('open');}
function selClient(){return clients.find(c=>c.id===selClientId)||{};}
function toast(msg,col='var(--green)'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:${col};color:#050510;padding:10px 20px;border-radius:20px;font-weight:800;font-size:14px;z-index:999;white-space:nowrap`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}
function loading(el,on){if(el)el.innerHTML=on?'<div style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>':'';}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function lineChart(data,color='#6ee7ff',h=80){
  if(!data||data.length<2)return`<div style="color:var(--muted);font-size:13px;padding:10px 0">Add at least 2 entries to see chart.</div>`;
  const vals=data.map(d=>d.val),min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const W=300,H=h,pts=data.map((d,i)=>[(i/(data.length-1))*(W-24)+12,H-((d.val-min)/rng)*(H-24)-12]);
  const trend=vals[vals.length-1]-vals[0];
  const gid='g'+color.replace(/[^a-z0-9]/gi,'');
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
  <polygon fill="url(#${gid})" points="${[...pts.map(p=>p.join(',')),`${pts[pts.length-1][0]},${H}`,`${pts[0][0]},${H}`].join(' ')}"/>
  <polyline fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${pts.map(p=>p.join(',')).join(' ')}"/>
  ${pts.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="var(--bg)" stroke-width="2"/>`).join('')}
  </svg><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--muted)">${data[0].date}</span><span style="font-size:13px;font-weight:800;color:${trend<=0?'var(--green)':'var(--red)'}">${trend>0?'+':''}${trend.toFixed(1)} kg</span><span style="font-size:11px;color:var(--muted)">${data[data.length-1].date}</span></div>`;
}

function barChart(data,color='#6ee7ff',label=''){
  if(!data||data.length<1)return'';
  const vals=data.map(d=>d.val),max=Math.max(...vals)||1;
  const W=300,H=80,bw=Math.min(32,(W-20)/data.length-4);
  const bars=data.map((d,i)=>{const x=10+(i/data.length)*(W-20)+((W-20)/data.length-bw)/2;const bh=Math.max(4,(d.val/max)*(H-8)),y=H-bh;return`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${i===data.length-1?color:color+'55'}"/>${data.length<=8?`<text x="${x+bw/2}" y="${H+14}" text-anchor="middle" font-size="9" fill="var(--muted)">${d.date}</text>`:''}`}).join('');
  return`<svg width="100%" viewBox="0 0 ${W} ${H+20}" style="overflow:visible">${bars}</svg><div style="display:flex;justify-content:space-between;margin-top:2px"><span style="font-size:11px;color:var(--muted)">${data[0].date}</span><span style="font-size:12px;font-weight:800;color:${color}">${Math.round(vals[vals.length-1]).toLocaleString()} ${label}</span><span style="font-size:11px;color:var(--muted)">${data[data.length-1].date}</span></div>`;
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
async function loadHome(){
  const {data,error} = await sb.from('clients').select('*').order('created_at',{ascending:false});
  if(error){toast('Error loading clients','var(--red)');return;}
  clients = data||[];
  renderHome();
  loadAIInsights();
  loadUnreadMessages();
  loadUpcomingBookings();
}

function renderHome(){
  const {data:sessions} = {data:[]};
  document.getElementById('home-stats').innerHTML=[
    {v:clients.length,l:'Clients',c:'var(--accent)'},
    {v:clients.filter(c=>c.active_subscription).length,l:'Active',c:'var(--green)'},
    {v:0,l:'Sessions',c:'var(--gold)'}

  document.getElementById('client-list').innerHTML = clients.length ? clients.map(c=>`

async function loadAIInsights(){
  if(!clients.length) return;
  // Get recent checkins for AI analysis
  const {data:checkins} = await sb.from('checkins').select('*,clients(name)').order('created_at',{ascending:false}).limit(20);
  const {data:workouts} = await sb.from('workouts').select('*,clients(name)').order('created_at',{ascending:false}).limit(20);
  if(!checkins&&!workouts) return;

  try {
    const prompt = `You are an AI assistant for a personal trainer called Darcy. Based on this client data, give 2-3 short actionable insights Darcy should know about today. Be specific and use client names. Keep each insight to one sentence.

Recent check-ins: ${JSON.stringify(checkins?.slice(0,10)||[])}
Recent workouts: ${JSON.stringify(workouts?.slice(0,10)||[])}
Clients: ${JSON.stringify(clients.map(c=>({name:c.name,goal:c.goal})))}

Return a JSON array of insight strings. Max 3 insights. Example: ["Jordan's energy has been low 3 days in a row — consider a deload", "Sam hasn't logged a workout in 5 days"]`;

    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g,'').trim();
    const insights = JSON.parse(text);
    if(insights.length){
      document.getElementById('ai-insights-card').innerHTML=`
        <div class="card" style="border-color:rgba(110,231,255,.3)">
          <div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">✦ AI Coaching Insights</div>
          ${insights.map(i=>`<div style="font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);color:var(--text)">${i}</div>`).join('')}
        </div>`;
    }
  } catch(e){}
}

// ─── ADD CLIENT ───────────────────────────────────────────────────────────────
async function addClient(){
  const name = document.getElementById('inp-client-name').value.trim();
  if(!name) return;
  const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const color = AVATAR_COLORS[clients.length % AVATAR_COLORS.length];
  const since = new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  const {data,error} = await sb.from('clients').insert({
    name,
    email: document.getElementById('inp-client-email').value.trim()||null,
    goal: document.getElementById('inp-client-goal').value,
    since, avatar:initials, color,
  }).select().single();
  if(error){toast('Error adding client','var(--red)');return;}
  // Save nutrition targets in preferences
  await sb.from('client_preferences').insert({client_id:data.id});
  closeModal('addClient');
  document.getElementById('inp-client-name').value='';
  document.getElementById('inp-client-email').value='';
  toast('Client added!');
  loadHome();
}

function renderClientTabs(){
  const tabs=[

    {id:'measurements',label:'📏 Measures'},
    {id:'photos',label:'📸 Photos'},

async function setTab(t){
  selTab=t;
  renderClientTabs();
  setTimeout(()=>{const a=document.querySelector('.tab-btn.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},50);
  const el = document.getElementById('client-tab-content');
  loading(el,true);
  if(t==='workouts') await renderWorkoutsTab();
  else if(t==='weight') await renderWeightTab();
  else if(t==='measurements') await renderMeasurementsTab();
  else if(t==='photos') await renderPhotosTab();
  else if(t==='nutrition') await renderNutritionTab();
  else if(t==='micros') await renderMicrosTab();
  else if(t==='checkins') await renderCheckinsTab();
  else if(t==='activity') await renderActivityTab();
  else if(t==='notes') await renderNotesTab();
  else if(t==='program') await renderProgramTab();
  else if(t==='videos') await renderVideosTab();
}

async function useTemplate(templateId){
  const {data:t}=await sb.from('programs').select('*').eq('id',templateId).single();
  if(!t) return;
  const {data:newProg}=await sb.from('programs').insert({client_id:selClientId,name:t.name+' (copy)',start_month:t.start_month,is_template:false}).select().single();
  // Copy weeks/days/exercises
  const {data:weeks}=await sb.from('program_weeks').select('*,program_days(*,program_exercises(*))').eq('program_id',templateId);
  for(const week of weeks||[]){
    const {data:newWeek}=await sb.from('program_weeks').insert({program_id:newProg.id,week_num:week.week_num}).select().single();
    for(const day of week.program_days||[]){
      const {data:newDay}=await sb.from('program_days').insert({week_id:newWeek.id,day_label:day.day_label,order_index:day.order_index}).select().single();
      for(const ex of day.program_exercises||[]){
        await sb.from('program_exercises').insert({day_id:newDay.id,name:ex.name,sets:ex.sets,reps:ex.reps,weight:ex.weight,rpe:ex.rpe,notes:ex.notes,youtube_url:ex.youtube_url,order_index:ex.order_index});
      }
    }
  }
  toast('Template applied!');
  setTab('program');
}

function addWeekToProgram(){editProg.weeks.push({week_num:editProg.weeks.length+1,days:[{day_label:'Day 1',exercises:[{name:'',sets:'',reps:'',weight:'',rpe:'',notes:''}]}]});renderProgramEditorBody();}
function addDayToWeek(wi){editProg.weeks[wi].days.push({day_label:`Day ${editProg.weeks[wi].days.length+1}`,exercises:[{name:'',sets:'',reps:'',weight:'',rpe:'',notes:''}]});renderProgramEditorBody();}
function addExToDay(wi,di){editProg.weeks[wi].days[di].exercises.push({name:'',sets:'',reps:'',weight:'',rpe:'',notes:''});renderProgramEditorBody();}
function removeWeek(wi){editProg.weeks.splice(wi,1);editProg.weeks.forEach((w,i)=>w.week_num=i+1);renderProgramEditorBody();}
function removeDay(wi,di){editProg.weeks[wi].days.splice(di,1);renderProgramEditorBody();}
function removeEx(wi,di,ei){editProg.weeks[wi].days[di].exercises.splice(ei,1);renderProgramEditorBody();}

async function saveProgramToDB(){
  if(!editProg) return;
  // Delete old weeks (cascade deletes days/exercises)
  await sb.from('program_weeks').delete().eq('program_id',editProg.id);
  // Re-insert all weeks/days/exercises
  for(const week of editProg.weeks){
    const {data:newWeek}=await sb.from('program_weeks').insert({program_id:editProg.id,week_num:week.week_num}).select().single();
    for(let di=0;di<week.days.length;di++){
      const day=week.days[di];
      const {data:newDay}=await sb.from('program_days').insert({week_id:newWeek.id,day_label:day.day_label,order_index:di}).select().single();
      for(let ei=0;ei<day.exercises.length;ei++){
        const ex=day.exercises[ei];
        if(!ex.name) continue;
        await sb.from('program_exercises').insert({day_id:newDay.id,name:ex.name,sets:+ex.sets||null,reps:+ex.reps||null,weight:+ex.weight||null,rpe:+ex.rpe||null,notes:ex.notes||null,order_index:ei});
      }
    }
  }
  toast('Program saved!');
  showScreen('client');
  setTab('program');
}

    ${pending.map(b=>`<div class="card" style="margin-bottom:10px;border-color:rgba(255,209,102,.3)">
      <div class="row">
        <div><div style="font-weight:800">${b.clients?.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${b.date} at ${b.time} · ${b.type}</div>${b.notes?`<div style="font-size:12px;color:var(--muted);margin-top:4px">"${b.notes}"</div>`:''}</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button onclick="updateBooking('${b.id}','confirmed')" style="background:var(--green)22;color:var(--green);border:1px solid var(--green)44;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700">Confirm</button>
          <button onclick="updateBooking('${b.id}','cancelled')" style="background:var(--red)22;color:var(--red);border:1px solid var(--red)44;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700">Decline</button>
        </div>
      </div>
    </div>`).join('')}`:''}
    ${confirmed.length?`<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;margin-top:16px">Confirmed (${confirmed.length})</div>
    ${confirmed.map(b=>`<div class="card" style="margin-bottom:10px">
      <div class="row"><div><div style="font-weight:800">${b.clients?.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${b.date} at ${b.time} · ${b.type}</div></div><span class="badge" style="background:var(--green)22;color:var(--green)">Confirmed</span></div>
    </div>`).join('')}`:''}
    ${!pending.length&&!confirmed.length?`<div style="text-align:center;color:var(--muted);padding:40px 0">No bookings yet.</div>`:''}`;
}

async function updateBooking(id,status){
  await sb.from('bookings').update({status}).eq('id',id);
  toast(status==='confirmed'?'Booking confirmed! ✓':'Booking declined');
  loadBookings();
}

async function saveAvailability(){
  toast('Availability saved!');
  closeModal('availability');
}

// ─── MONTH SELECT ─────────────────────────────────────────────────────────────
const msel=document.getElementById('inp-prog-month');
msel.innerHTML=`<option value="">Select month…</option>`+allMonths().map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join('');

// ─── WIRE UP BUTTONS ─────────────────────────────────────────────────────────
document.getElementById('btn-add-client').onclick=()=>openModal('addClient');
document.getElementById('btn-back-home').onclick=()=>{showScreen('home');loadHome();};
document.getElementById('btn-back-client-prog').onclick=()=>{showScreen('client');setTab('program');};
document.getElementById('btn-save-program').onclick=saveProgramToDB;
document.getElementById('btn-msg-client').onclick=()=>openModal('sendMessage');

document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});

// ─── INIT ────────────────────────────────────────────────────────────────────
// Check if already logged in this session
if(sessionStorage.getItem('pt-authed')==='1'){
  authed=true;
  showScreen('home');
  loadHome();
}

document.getElementById('login-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

const _doLogin=doLogin;
window.doLogin=function(){
  _doLogin();
  if(authed) sessionStorage.setItem('pt-authed','1');
};
</script>
