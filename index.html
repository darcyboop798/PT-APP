<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#070710"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PT Tracker"/>
<title>PT Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
:root{
  --bg:#070710;--card:#0f0f1a;--card2:#161625;--border:#1f1f35;
  --accent:#6ee7ff;--gold:#ffd166;--green:#06d6a0;--red:#ef476f;
  --text:#eeeef5;--muted:#5a5a7a;--muted2:#3a3a55;
  --purple:#a78bfa;--orange:#fb923c;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}
input,select,textarea{font-family:'Nunito',sans-serif;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;width:100%;outline:none;}
input::placeholder,textarea::placeholder{color:var(--muted2);}
select option{background:var(--card);}
button{cursor:pointer;font-family:'Nunito',sans-serif;}
.syne{font-family:'Syne',sans-serif;}
.screen{display:none;padding-bottom:48px;}
.screen.active{display:block;}
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px;}
.card2{background:var(--card2);border-radius:12px;padding:12px 14px;}
.btn-primary{width:100%;background:var(--accent);color:#050510;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;font-family:'Syne',sans-serif;}
.btn-ghost{background:none;color:var(--muted);border:1.5px dashed var(--muted2);border-radius:12px;padding:11px;font-size:14px;width:100%;margin-bottom:8px;}
.btn-tag{background:rgba(110,231,255,.08);color:var(--accent);border:1px solid rgba(110,231,255,.27);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;}
.tab-btn{padding:6px 12px;border-radius:20px;border:none;font-size:11px;font-weight:700;text-transform:capitalize;flex-shrink:0;background:var(--card2);color:var(--muted);white-space:nowrap;}
.tab-btn.active{background:var(--accent);color:#050510;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:flex-end;z-index:200;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:0 20px 48px;border:1px solid var(--border);border-bottom:none;}
.modal-handle{width:40px;height:4px;background:var(--muted2);border-radius:2px;margin:12px auto 14px;}
.label{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1.2px;}
.pill{font-size:12px;padding:3px 10px;border-radius:20px;}
.row{display:flex;justify-content:space-between;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
svg text{font-family:'Nunito',sans-serif;}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div id="screen-home" class="screen active">
  <div style="padding:28px 20px 0">
    <div style="font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">PT Dashboard</div>
    <div class="row" style="margin-bottom:20px">
      <div class="syne" style="font-size:30px;font-weight:800;line-height:1.15">My<br/>Clients</div>
      <button id="btn-add-client" style="background:var(--accent);color:#050510;border:none;border-radius:50%;width:48px;height:48px;font-size:26px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(110,231,255,.15)">+</button>
    </div>
    <div class="grid2" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:24px" id="home-stats"></div>
  </div>
  <div id="client-list" style="padding:0 20px;display:flex;flex-direction:column;gap:12px"></div>
</div>

<!-- ═══ CLIENT ═══ -->
<div id="screen-client" class="screen">
  <div style="padding:20px 20px 0;background:var(--bg);">
    <button id="btn-back-home" style="background:none;border:none;color:var(--muted);font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:6px">← All Clients</button>
    <div class="row" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:14px;flex:1">
        <div id="client-avatar-big" style="width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0"></div>
        <div><div id="client-name-big" class="syne" style="font-size:22px;font-weight:800"></div><div id="client-meta-big" style="font-size:13px;color:var(--muted)"></div></div>
      </div>
    </div>
    <div class="tabs" id="client-tabs"></div>
  </div>
  <div id="client-tab-content" style="padding:0 20px;margin-top:8px"></div>
</div>

<!-- ═══ PROGRAM EDITOR ═══ -->
<div id="screen-program" class="screen">
  <div style="padding:0 20px 14px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)">
    <button id="btn-back-client" style="background:none;border:none;color:var(--muted);font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px">← Back</button>
    <div class="row">
      <div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase">Program Editor</div>
        <div id="prog-editor-name" class="syne" style="font-size:20px;font-weight:800"></div>
        <div id="prog-editor-month" style="font-size:12px;color:var(--accent);margin-top:2px"></div>
      </div>
      <button id="btn-save-program" class="btn-primary" style="width:auto;padding:10px 20px;font-size:14px">Save ✓</button>
    </div>
  </div>
  <div id="program-editor-body" style="padding:16px 20px 0"></div>
</div>

<!-- ═══ MODALS ═══ -->
<div id="modal-addClient" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">New Client</div>
    <label class="label">Full Name</label>
    <input id="inp-client-name" placeholder="e.g. Jordan Mills" style="margin-bottom:14px"/>
    <label class="label">Goal</label>
    <select id="inp-client-goal" style="margin-bottom:24px;appearance:none">
      <option>Fat Loss</option><option>Muscle Gain</option><option>Strength</option>
      <option>Endurance</option><option>General Fitness</option><option>Rehab</option><option>Body Recomp</option>
    </select>
    <button class="btn-primary" onclick="addClient()">Add Client</button>
  </div>
</div>

<div id="modal-addWeight" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Log Weight</div>
    <label class="label">Weight (kg)</label>
    <input id="inp-weight" type="number" step="0.1" placeholder="e.g. 82.5" style="margin-bottom:24px"/>
    <button class="btn-primary" onclick="saveWeight()">Save</button>
  </div>
</div>

<div id="modal-addMeasure" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Log Measurements</div>
    <div class="grid2" style="margin-bottom:20px">
      <div><label class="label">Chest (cm)</label><input id="inp-chest" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Waist (cm)</label><input id="inp-waist" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Hips (cm)</label><input id="inp-hips" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Arms (cm)</label><input id="inp-arms" type="number" step="0.5" placeholder="0"/></div>
      <div><label class="label">Thighs (cm)</label><input id="inp-thighs" type="number" step="0.5" placeholder="0"/></div>
    </div>
    <button class="btn-primary" onclick="saveMeasure()">Save</button>
  </div>
</div>

<div id="modal-addWorkout" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Log Session</div>
    <div id="workout-exercises"></div>
    <button class="btn-ghost" onclick="addWorkoutExRow()">+ Add Exercise</button>
    <button class="btn-primary" onclick="saveWorkout()">Save Session</button>
  </div>
</div>

<div id="modal-addFood" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Log Food</div>
    <label class="label">Meal</label>
    <select id="inp-food-meal" style="margin-bottom:12px;appearance:none">
      <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
      <option>Snacks</option><option>Pre-Workout</option><option>Post-Workout</option>
    </select>
    <label class="label">Food Item</label>
    <input id="inp-food-item" placeholder="e.g. Chicken breast 150g" style="margin-bottom:12px"/>
    <div class="grid2" style="margin-bottom:8px">
      <div><label class="label">Calories (kcal)</label><input id="inp-food-cals" type="number" placeholder="0"/></div>
      <div><label class="label">Protein (g)</label><input id="inp-food-p" type="number" placeholder="0"/></div>
      <div><label class="label">Carbs (g)</label><input id="inp-food-c" type="number" placeholder="0"/></div>
      <div><label class="label">Fat (g)</label><input id="inp-food-f" type="number" placeholder="0"/></div>
    </div>
    <details style="margin-bottom:16px">
      <summary style="font-size:12px;color:var(--muted);cursor:pointer;padding:8px 0;list-style:none">▸ Add micronutrients (optional)</summary>
      <div class="grid2" style="margin-top:10px">
        <div><label class="label">Vit C (mg)</label><input id="inp-vitc" type="number" placeholder="0"/></div>
        <div><label class="label">Vit D (mcg)</label><input id="inp-vitd" type="number" placeholder="0"/></div>
        <div><label class="label">Iron (mg)</label><input id="inp-iron" type="number" placeholder="0"/></div>
        <div><label class="label">Calcium (mg)</label><input id="inp-calcium" type="number" placeholder="0"/></div>
        <div><label class="label">Magnesium (mg)</label><input id="inp-mag" type="number" placeholder="0"/></div>
        <div><label class="label">Zinc (mg)</label><input id="inp-zinc" type="number" placeholder="0"/></div>
        <div><label class="label">Potassium (mg)</label><input id="inp-potassium" type="number" placeholder="0"/></div>
        <div><label class="label">Sodium (mg)</label><input id="inp-sodium" type="number" placeholder="0"/></div>
        <div><label class="label">Fibre (g)</label><input id="inp-fibre" type="number" placeholder="0"/></div>
        <div><label class="label">Omega-3 (mg)</label><input id="inp-omega3" type="number" placeholder="0"/></div>
      </div>
    </details>
    <button class="btn-primary" onclick="saveFood()">Add to Diary</button>
  </div>
</div>

<div id="modal-nutTargets" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">Daily Targets</div>
    <div class="grid2" style="margin-bottom:16px">
      <div><label class="label">Calories</label><input id="tgt-cals" type="number" placeholder="2000"/></div>
      <div><label class="label">Protein (g)</label><input id="tgt-protein" type="number" placeholder="150"/></div>
      <div><label class="label">Carbs (g)</label><input id="tgt-carbs" type="number" placeholder="200"/></div>
      <div><label class="label">Fat (g)</label><input id="tgt-fat" type="number" placeholder="65"/></div>
    </div>
    <div class="syne" style="font-size:13px;font-weight:800;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Micronutrient Targets</div>
    <div class="grid2" style="margin-bottom:20px">
      <div><label class="label">Vit C (mg)</label><input id="tgt-vitc" type="number" placeholder="90"/></div>
      <div><label class="label">Vit D (mcg)</label><input id="tgt-vitd" type="number" placeholder="20"/></div>
      <div><label class="label">Iron (mg)</label><input id="tgt-iron" type="number" placeholder="18"/></div>
      <div><label class="label">Calcium (mg)</label><input id="tgt-calcium" type="number" placeholder="1000"/></div>
      <div><label class="label">Magnesium (mg)</label><input id="tgt-mag" type="number" placeholder="400"/></div>
      <div><label class="label">Zinc (mg)</label><input id="tgt-zinc" type="number" placeholder="11"/></div>
      <div><label class="label">Potassium (mg)</label><input id="tgt-potassium" type="number" placeholder="3500"/></div>
      <div><label class="label">Sodium (mg)</label><input id="tgt-sodium" type="number" placeholder="2300"/></div>
      <div><label class="label">Fibre (g)</label><input id="tgt-fibre" type="number" placeholder="30"/></div>
      <div><label class="label">Omega-3 (mg)</label><input id="tgt-omega3" type="number" placeholder="1000"/></div>
    </div>
    <button class="btn-primary" onclick="saveNutTargets()">Save Targets</button>
  </div>
</div>

<div id="modal-addProgram" class="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="syne" style="font-size:20px;font-weight:800;margin-bottom:16px">New Program</div>
    <label class="label">Program Name</label>
    <input id="inp-prog-name" placeholder="e.g. Phase 2 – Strength Block" style="margin-bottom:14px"/>
    <label class="label">Start Month</label>
    <select id="inp-prog-month" style="margin-bottom:24px;appearance:none" ></select>
    <button class="btn-primary" onclick="createProgram()">Create Program</button>
  </div>
</div>

function fmtToday(){return new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function monthLabel(ym){if(!ym)return"";const[y,m]=ym.split("-");return new Date(y,m-1,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});}
function allMonths(){const a=[],n=new Date();for(let i=-2;i<=18;i++){const d=new Date(n.getFullYear(),n.getMonth()+i,1);a.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}return a;}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
function lineChart(data,color="#6ee7ff",h=80){
  if(!data||data.length<2)return`<div style="color:var(--muted);font-size:13px;padding:10px 0">Add at least 2 entries to see chart.</div>`;
  const vals=data.map(d=>d.val),min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const W=300,H=h,pts=data.map((d,i)=>[(i/(data.length-1))*(W-24)+12,H-((d.val-min)/rng)*(H-24)-12]);
  const trend=vals[vals.length-1]-vals[0];
  const gid="g"+color.replace(/[^a-z0-9]/gi,"");
  return`<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
  <polygon fill="url(#${gid})" points="${[...pts.map(p=>p.join(",")),`${pts[pts.length-1][0]},${H}`,`${pts[0][0]},${H}`].join(" ")}"/>
  <polyline fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${pts.map(p=>p.join(",")).join(" ")}"/>
  ${pts.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="4" fill="${color}" stroke="var(--bg)" stroke-width="2"/>`).join("")}
  </svg><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--muted)">${data[0].date}</span><span style="font-size:13px;font-weight:800;color:${trend<=0?"var(--green)":"var(--red)"}">${trend>0?"+":""}${trend.toFixed(1)} kg</span><span style="font-size:11px;color:var(--muted)">${data[data.length-1].date}</span></div>`;
}

function barChart(data,color="#6ee7ff",label=""){
  if(!data||data.length<1)return"";
  const vals=data.map(d=>d.val),max=Math.max(...vals)||1;
  const W=300,H=80,bw=Math.min(32,(W-20)/data.length-4);
  const bars=data.map((d,i)=>{
    const x=10+(i/data.length)*(W-20)+((W-20)/data.length-bw)/2;
    const bh=Math.max(4,(d.val/max)*(H-8)),y=H-bh;
    return`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${i===data.length-1?color:color+"55"}"/>
    ${data.length<=8?`<text x="${x+bw/2}" y="${H+14}" text-anchor="middle" font-size="9" fill="var(--muted)">${d.date}</text>`:""}`;
  }).join("");
  return`<svg width="100%" viewBox="0 0 ${W} ${H+20}" style="overflow:visible">${bars}</svg>
  <div style="display:flex;justify-content:space-between;margin-top:2px"><span style="font-size:11px;color:var(--muted)">${data[0].date}</span><span style="font-size:12px;font-weight:800;color:${color}">${Math.round(vals[vals.length-1]).toLocaleString()} ${label}</span><span style="font-size:11px;color:var(--muted)">${data[data.length-1].date}</span></div>`;
}

function dualLineChart(data,c1="#6ee7ff",c2="#ffd166",l1="",l2=""){
  if(!data||data.length<2)return`<div style="color:var(--muted);font-size:13px">Log more sessions to see trends.</div>`;
  const v1=data.map(d=>d.v1),v2=data.map(d=>d.v2);
  const mn1=Math.min(...v1),mx1=Math.max(...v1),r1=mx1-mn1||1;
  const mn2=Math.min(...v2),mx2=Math.max(...v2),r2=mx2-mn2||1;
  const W=300,H=80,pts1=data.map((d,i)=>[(i/(data.length-1))*(W-24)+12,H-((d.v1-mn1)/r1)*(H-24)-12]);
  const pts2=data.map((d,i)=>[(i/(data.length-1))*(W-24)+12,H-((d.v2-mn2)/r2)*(H-24)-12]);
  return`<div style="display:flex;gap:16px;margin-bottom:8px"><span style="font-size:11px;color:${c1};font-weight:700">● ${l1}</span><span style="font-size:11px;color:${c2};font-weight:700">- - ${l2}</span></div>
  <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
  <polyline fill="none" stroke="${c1}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${pts1.map(p=>p.join(",")).join(" ")}"/>
  <polyline fill="none" stroke="${c2}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,3" points="${pts2.map(p=>p.join(",")).join(" ")}"/>
  ${pts1.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3.5" fill="${c1}" stroke="var(--bg)" stroke-width="2"/>`).join("")}
  ${pts2.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3" fill="${c2}" stroke="var(--bg)" stroke-width="2"/>`).join("")}
  </svg><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--muted)">${data[0].date}</span><span style="font-size:11px;color:var(--muted)">${data[data.length-1].date}</span></div>`;
}

function microBar(key,val,tgt,color){
  const pct=Math.min(100,tgt?Math.round(val/tgt*100):0);
  const over=pct>=100;
  return`<div style="background:var(--card2);border-radius:10px;padding:10px 12px">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span style="font-size:11px;color:var(--muted)">${MICRO_LABELS[key]}</span>
      <span style="font-size:11px;font-weight:800;color:${over?'var(--green)':color}">${val}<span style="font-weight:400;color:var(--muted)"> ${MICRO_UNITS[key]}</span></span>
    </div>
    <div style="background:var(--muted2);border-radius:4px;height:5px;overflow:hidden">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:4px"></div>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px">${pct}% of ${tgt} ${MICRO_UNITS[key]}</div>
  </div>`;
}

function renderWorkoutsTab(id){
  const wos=getOrInit(state.workouts,id,()=>[]);
  const sessions=[...wos].reverse();
  let charts="";
  if(wos.length>=2){
    const tonnage=sessions.map(s=>({date:s.date,val:s.exercises.reduce((sum,ex)=>sum+(ex.sets||0)*(ex.reps||0)*(ex.weight||0),0)})).filter(d=>d.val>0);
    const dual=sessions.map(s=>{
      const t=s.exercises.reduce((sum,ex)=>sum+(ex.sets||0)*(ex.reps||0)*(ex.weight||0),0);
      const rpes=s.exercises.map(ex=>parseFloat(ex.rpe)||0).filter(r=>r>0);
      const avg=rpes.length?rpes.reduce((a,b)=>a+b,0)/rpes.length:null;
      return t>0&&avg!==null?{date:s.date,v1:t,v2:avg}:null;
    }).filter(Boolean);
    const last3=dual.slice(-3);
    const fatigueSignal=last3.length>=2&&last3[last3.length-1].v1<last3[0].v1&&last3[last3.length-1].v2>last3[0].v2;
    const adaptSignal=last3.length>=2&&last3[last3.length-1].v1>=last3[0].v1&&last3[last3.length-1].v2<=last3[0].v2;
    const badge=fatigueSignal?`<span class="pill" style="background:var(--red)22;color:var(--red);font-weight:800">⚠ Fatigue</span>`:adaptSignal?`<span class="pill" style="background:var(--green)22;color:var(--green);font-weight:800">↑ Adapting</span>`:`<span class="pill" style="background:var(--gold)22;color:var(--gold);font-weight:800">~ Stable</span>`;
    charts=`
    ${dual.length>=2?`<div class="card" style="margin-bottom:12px">
      <div class="row" style="margin-bottom:4px"><div><div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px">Fatigue Tracker</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Volume ↓ + RPE ↑ = fatigue signal</div></div>${badge}</div>
      ${dualLineChart(dual,"#6ee7ff","#ef476f","Tonnage","Avg RPE")}
    </div>`:""}
    ${tonnage.length>=2?`<div class="card" style="margin-bottom:12px">
      <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Session Volume</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Sets × Reps × Weight</div>
      ${barChart(tonnage,"#6ee7ff","kg")}
    </div>`:""}`;
  }
  const log=wos.map((w,i)=>`<div class="card" style="margin-bottom:10px">
    <div style="font-size:12px;color:var(--accent);font-weight:700;margin-bottom:10px;letter-spacing:1px">${w.date}</div>
    ${w.exercises.map((ex,j)=>`<div class="row" style="padding:6px 0;border-bottom:${j<w.exercises.length-1?"1px solid var(--border)":"none"}">
      <span style="font-size:14px;font-weight:600">${ex.name}</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:var(--muted)">${ex.sets}×${ex.reps}${ex.weight?` @ ${ex.weight}kg`:""}</span>
        ${ex.rpe?`<span class="pill" style="font-size:11px;font-weight:700;color:var(--gold);background:var(--gold)18">RPE ${ex.rpe}</span>`:""}
      </div>
    </div>`).join("")}
  </div>`).join("")||`<div style="text-align:center;color:var(--muted);padding:30px 0">No sessions logged yet.</div>`;
  return`<div class="row" style="margin-bottom:14px"><span style="font-size:13px;color:var(--muted)">${wos.length} sessions</span><button class="btn-tag" onclick="openModal('addWorkout')">+ Log Session</button></div>${charts}<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">Session Log</div>${log}`;
}

      </div>
      <div class="grid2">
        ${[["Protein",today.protein,tgt.protein,"var(--accent)"],["Carbs",today.carbs,tgt.carbs,"var(--gold)"],["Fat",today.fat,tgt.fat,"var(--green)"]].map(([l,v,t,col])=>`
        <div class="card2">
          <div class="row" style="margin-bottom:6px"><span style="font-size:11px;color:var(--muted);text-transform:uppercase">${l}</span><span style="font-size:12px;font-weight:800;color:${col}">${v}g</span></div>
          <div style="background:var(--muted2);border-radius:4px;height:5px;overflow:hidden"><div style="width:${Math.min(100,t?Math.round(v/t*100):0)}%;height:100%;background:${col};border-radius:4px"></div></div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px">Target: ${t}g</div>
        </div>`).join("")}
      </div>
    </div>`;
  }
  const calHistory=nu.length>=2?`<div class="card" style="margin-bottom:14px"><div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Calorie History</div><div style="font-size:11px;color:var(--muted);margin-bottom:12px">Daily intake</div>${barChart([...nu].reverse().map(d=>({date:d.date,val:d.cals})),"#6ee7ff","kcal")}</div>`:"";
  const proteinTrend=nu.length>=2?`<div class="card" style="margin-bottom:14px"><div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Protein Trend</div>${lineChart([...nu].reverse().map(d=>({date:d.date,val:d.protein})),"#6ee7ff")}</div>`:"";
  const diary=nu.map((day,i)=>`<div class="card" style="margin-bottom:12px">
    <div class="row" style="padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:0">
      <span style="font-size:13px;font-weight:800;color:var(--accent)">${day.date}</span>
      <span style="font-size:11px;color:var(--muted)">${day.cals.toLocaleString()} kcal · P:${day.protein}g C:${day.carbs}g F:${day.fat}g</span>
    </div>
    ${day.meals.filter(m=>m.foods.length>0).map((meal,j,arr)=>`
    <div style="padding:10px 0;border-bottom:${j<arr.length-1?"1px solid var(--border)":"none"}">
      <div style="font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${meal.name}</div>
      ${meal.foods.map(food=>`<div class="row" style="padding:4px 0"><span style="font-size:13px">${food.item}</span><span style="font-size:12px;color:var(--muted)">${food.cals} kcal</span></div>`).join("")}
    </div>`).join("")}
  </div>`).join("")||`<div style="text-align:center;color:var(--muted);padding:30px 0">No food logged yet.</div>`;
  return`<div class="row" style="margin-bottom:14px">
    <span style="font-size:13px;color:var(--muted)">${nu.length} days logged</span>
    <div style="display:flex;gap:8px">
      <button class="btn-tag" onclick="openNutTargets()" style="font-size:12px">⚙ Targets</button>
      <button class="btn-tag" onclick="openModal('addFood')">+ Log Food</button>
    </div>
  </div>
  ${todayCard}${calHistory}${proteinTrend}
  <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">Food Diary</div>
  ${diary}`;
}

// ─── MICROS TAB ───────────────────────────────────────────────────────────────
function renderMicrosTab(id){
  const nu=getOrInit(state.nutrition,id,()=>[]);
  const tgt=state.nutTargets[id]||{...DEFAULT_MICRO_TGTS};
  const today=nu[0]||null;

  // Aggregate today's micros
  const todayMicros=(today&&today.micros)||Object.fromEntries(MICROS.map(k=>[k,0]));

  const todayCard=today?`<div class="card" style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">Today's Micronutrients — ${today.date}</div>
    <div class="grid2">${MICROS.map(k=>microBar(k,todayMicros[k]||0,tgt[k]||DEFAULT_MICRO_TGTS[k],MICRO_COLORS[k])).join("")}</div>
  </div>`:`<div style="text-align:center;color:var(--muted);padding:30px 0;font-size:14px">No food logged yet — micros will appear here after logging a meal.</div>`;

  // 7-day trend for key micros
  const trend7=nu.length>=2?`<div class="card" style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">7-Day Trends</div>
    ${["vitc","vitd","iron","calcium","mag","omega3"].map(k=>{
      const pts=[...nu].reverse().map(d=>({date:d.date,val:(d.micros&&d.micros[k])||0}));
      if(pts.length<2)return"";
      return`<div style="margin-bottom:16px"><div style="font-size:12px;color:${MICRO_COLORS[k]};font-weight:700;margin-bottom:6px">${MICRO_LABELS[k]} (${MICRO_UNITS[k]})</div>${lineChart(pts,MICRO_COLORS[k],60)}</div>`;
    }).join("")}
  </div>`:"";

  // Deficiency alerts
  const alerts=MICROS.filter(k=>{
    const val=todayMicros[k]||0;
    const t=tgt[k]||DEFAULT_MICRO_TGTS[k];
    return val/t<0.5;
  });
  const alertCard=alerts.length&&today?`<div class="card" style="margin-bottom:14px;border-color:var(--red)44">
    <div style="font-size:12px;font-weight:800;color:var(--red);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">⚠ Low Today (&lt;50% of target)</div>
    ${alerts.map(k=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text)">${MICRO_LABELS[k]}</span>
      <span style="font-size:12px;color:var(--red);font-weight:700">${todayMicros[k]||0} / ${tgt[k]||DEFAULT_MICRO_TGTS[k]} ${MICRO_UNITS[k]}</span>
    </div>`).join("")}
  </div>`:""

  return`<div class="row" style="margin-bottom:14px">
    <span style="font-size:13px;color:var(--muted)">Micronutrients</span>
    <button class="btn-tag" onclick="openNutTargets()" style="font-size:12px">⚙ Targets</button>
  </div>
  ${alertCard}${todayCard}${trend7}
  <div style="font-size:11px;color:var(--muted);padding:8px 0 20px">Micronutrient data is entered when logging food under the Nutrition tab.</div>`;
}

// ─── PROGRAM TAB ──────────────────────────────────────────────────────────────
function renderProgramTab(id){
  const progs=getOrInit(state.programs,id,()=>[]);
  const list=progs.map(p=>`<div class="card" style="margin-bottom:10px">
    <div class="row" style="margin-bottom:8px">
      <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:16px">${p.name}</div>${p.startMonth?`<div style="font-size:12px;color:var(--muted);margin-top:2px">Starts ${monthLabel(p.startMonth)}</div>`:""}</div>
      <span class="pill" style="color:var(--accent);background:rgba(110,231,255,.08);flex-shrink:0;margin-left:8px">${p.weeks.length}w</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button onclick="openProgramEditor(${p.id})" class="btn-primary" style="flex:1;padding:10px;font-size:13px">Edit Program</button>
      <button onclick="deleteProgram(${p.id})" style="background:var(--card2);color:var(--red);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:16px">🗑</button>
    </div>
  </div>`).join("")||`<div style="text-align:center;color:var(--muted);padding:30px 0">No programs yet. Create one to plan weeks in advance!</div>`;
  return`<div class="row" style="margin-bottom:14px"><span style="font-size:13px;color:var(--muted)">${progs.length} programs</span><button class="btn-tag" onclick="openModal('addProgram')">+ New Program</button></div>${list}`;
}

// ─── PROGRAM EDITOR ───────────────────────────────────────────────────────────
function openProgramEditor(progId){
  const id=selClientId;
  const prog=(state.programs[id]||[]).find(p=>p.id===progId);
  if(!prog)return;
  editProg=JSON.parse(JSON.stringify(prog));
  document.getElementById("prog-editor-name").textContent=editProg.name;
  document.getElementById("prog-editor-month").textContent=editProg.startMonth?`Starts ${monthLabel(editProg.startMonth)}`:"";
  renderProgramEditorBody();
  showScreen("program");
}

function renderProgramEditorBody(){
  const body=document.getElementById("program-editor-body");
  body.innerHTML=editProg.weeks.map((week,wi)=>`
    <div class="card" style="margin-bottom:20px">
      <div class="row" style="margin-bottom:14px">
        <div class="syne" style="font-size:14px;font-weight:800;color:var(--gold);letter-spacing:2px;text-transform:uppercase">Week ${week.weekNum}</div>
        <button onclick="removeWeek(${wi})" style="background:none;border:none;color:var(--red);font-size:13px;opacity:.7">Remove week</button>
      </div>
      ${week.days.map((day,di)=>`
      <div class="card2" style="margin-bottom:10px">
        <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
          <input value="${day.dayLabel}" oninput="editProg.weeks[${wi}].days[${di}].dayLabel=this.value" style="flex:1;font-size:13px;font-weight:700;padding:8px 12px;background:var(--bg)"/>
          <button onclick="removeDay(${wi},${di})" style="background:none;border:none;color:var(--muted);font-size:18px;flex-shrink:0">×</button>
        </div>
        ${day.exercises.map((ex,ei)=>`
        <div style="background:var(--bg);border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid var(--border)">
          <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
            <input placeholder="Exercise" value="${ex.name}" oninput="editProg.weeks[${wi}].days[${di}].exercises[${ei}].name=this.value" style="flex:1;padding:7px 10px;font-size:13px;background:var(--card2)"/>
            <button onclick="removeEx(${wi},${di},${ei})" style="background:none;border:none;color:var(--red);font-size:18px;padding:0 2px">×</button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;margin-bottom:6px">
            <input type="number" placeholder="Sets" value="${ex.sets||""}" oninput="editProg.weeks[${wi}].days[${di}].exercises[${ei}].sets=this.value" style="padding:7px 4px;font-size:12px;text-align:center"/>
            <input type="number" placeholder="Reps" value="${ex.reps||""}" oninput="editProg.weeks[${wi}].days[${di}].exercises[${ei}].reps=this.value" style="padding:7px 4px;font-size:12px;text-align:center"/>
            <input type="number" placeholder="kg" value="${ex.weight||""}" oninput="editProg.weeks[${wi}].days[${di}].exercises[${ei}].weight=this.value" style="padding:7px 4px;font-size:12px;text-align:center"/>
            <input type="number" placeholder="RPE" value="${ex.rpe||""}" oninput="editProg.weeks[${wi}].days[${di}].exercises[${ei}].rpe=this.value" style="padding:7px 4px;font-size:12px;text-align:center"/>
          </div>
          <input placeholder="Notes (optional)" value="${ex.notes||""}" oninput="editProg.weeks[${wi}].days[${di}].exercises[${ei}].notes=this.value" style="padding:7px 10px;font-size:12px;color:var(--muted)"/>
        </div>`).join("")}
        <button onclick="addExToDay(${wi},${di})" class="btn-ghost" style="font-size:12px;padding:8px;color:var(--accent);border-color:rgba(110,231,255,.2);margin-bottom:0">+ Add Exercise</button>
      </div>`).join("")}
      <button onclick="addDayToWeek(${wi})" class="btn-ghost" style="font-size:12px;color:var(--gold);border-color:rgba(255,209,102,.27);margin-bottom:0">+ Add Training Day</button>
    </div>`).join("")+
  `<button onclick="addWeekToProgram()" class="btn-ghost" style="color:var(--accent);border-color:rgba(110,231,255,.27);padding:14px;font-size:14px;margin-bottom:12px">+ Add Week</button>
  <button onclick="saveProgram()" class="btn-primary">Save Program</button>`;
}

function addWeekToProgram(){editProg.weeks.push({weekNum:editProg.weeks.length+1,days:[{dayLabel:"Day 1",exercises:[{name:"",sets:"",reps:"",weight:"",rpe:"",notes:""}]}]});renderProgramEditorBody();}
function addDayToWeek(wi){editProg.weeks[wi].days.push({dayLabel:`Day ${editProg.weeks[wi].days.length+1}`,exercises:[{name:"",sets:"",reps:"",weight:"",rpe:"",notes:""}]});renderProgramEditorBody();}
function addExToDay(wi,di){editProg.weeks[wi].days[di].exercises.push({name:"",sets:"",reps:"",weight:"",rpe:"",notes:""});renderProgramEditorBody();}
function removeWeek(wi){editProg.weeks.splice(wi,1);editProg.weeks.forEach((w,i)=>w.weekNum=i+1);renderProgramEditorBody();}
function removeDay(wi,di){editProg.weeks[wi].days.splice(di,1);renderProgramEditorBody();}
function removeEx(wi,di,ei){editProg.weeks[wi].days[di].exercises.splice(ei,1);renderProgramEditorBody();}
function saveProgram(){
  const id=selClientId;
  state.programs[id]=state.programs[id].map(p=>p.id===editProg.id?editProg:p);
  showScreen("client");setTab("program");
}
function deleteProgram(progId){
  const id=selClientId;
  state.programs[id]=state.programs[id].filter(p=>p.id!==progId);
  setTab("program");
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function addClient(){
  const name=document.getElementById("inp-client-name").value.trim();
  if(!name)return;
  const initials=name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
  const id=Date.now();
  const color=AVATAR_COLORS[state.clients.length%AVATAR_COLORS.length];
  const since=new Date().toLocaleDateString("en-GB",{month:"short",year:"numeric"});
  state.clients.push({id,name,goal:document.getElementById("inp-client-goal").value,since,avatar:initials,color});
  state.weights[id]=[];state.measurements[id]=[];state.workouts[id]=[];state.photos[id]=[];
  state.nutrition[id]=[];state.programs[id]=[];
  state.nutTargets[id]={cals:2000,protein:150,carbs:200,fat:65,...DEFAULT_MICRO_TGTS};
  document.getElementById("inp-client-name").value="";
  closeModal("addClient");renderHome();
}

function saveWeight(){
  const v=parseFloat(document.getElementById("inp-weight").value);
  if(!v||!selClientId)return;
  getOrInit(state.weights,selClientId,()=>[]).push({date:fmtToday(),val:v});
  document.getElementById("inp-weight").value="";
  closeModal("addWeight");setTab("weight");
}

function saveMeasure(){
  if(!selClientId)return;
  const entry={date:fmtToday(),chest:+document.getElementById("inp-chest").value||0,waist:+document.getElementById("inp-waist").value||0,hips:+document.getElementById("inp-hips").value||0,arms:+document.getElementById("inp-arms").value||0,thighs:+document.getElementById("inp-thighs").value||0};
  getOrInit(state.measurements,selClientId,()=>[]).push(entry);
  closeModal("addMeasure");setTab("measurements");
}

let workoutExCount=1;
function openModal(id){
  document.getElementById("modal-"+id).classList.add("open");
  if(id==="addWorkout"){workoutExCount=1;renderWorkoutExRows();}
}
function renderWorkoutExRows(){
  document.getElementById("workout-exercises").innerHTML=Array.from({length:workoutExCount},(_,i)=>`
    <div class="card2" style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Exercise ${i+1}</div>
      <input id="wo-name-${i}" placeholder="Exercise name" style="margin-bottom:8px"/>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px">
        <input id="wo-sets-${i}" type="number" placeholder="Sets" style="text-align:center;padding:8px 4px"/>
        <input id="wo-reps-${i}" type="number" placeholder="Reps" style="text-align:center;padding:8px 4px"/>
        <input id="wo-weight-${i}" type="number" placeholder="kg" style="text-align:center;padding:8px 4px"/>
        <input id="wo-rpe-${i}" type="number" placeholder="RPE" style="text-align:center;padding:8px 4px"/>
      </div>
    </div>`).join("");
}
function addWorkoutExRow(){workoutExCount++;renderWorkoutExRows();}
function saveWorkout(){
  const exercises=[];
  for(let i=0;i<workoutExCount;i++){
    const name=document.getElementById(`wo-name-${i}`)?.value?.trim();
    if(name)exercises.push({name,sets:+document.getElementById(`wo-sets-${i}`).value||0,reps:+document.getElementById(`wo-reps-${i}`).value||0,weight:+document.getElementById(`wo-weight-${i}`).value||0,rpe:document.getElementById(`wo-rpe-${i}`).value||""});
  }
  if(!exercises.length)return;
  getOrInit(state.workouts,selClientId,()=>[]).unshift({date:fmtToday(),exercises});
  closeModal("addWorkout");setTab("workouts");
}

function handlePhoto(e){
  const file=e.target.files[0];if(!file||!selClientId)return;
  const reader=new FileReader();
  reader.onload=ev=>{getOrInit(state.photos,selClientId,()=>[]).unshift({date:fmtToday(),src:ev.target.result});setTab("photos");};
  reader.readAsDataURL(file);
}

function saveFood(){
  if(!selClientId)return;
  const meal=document.getElementById("inp-food-meal").value;
  const item=document.getElementById("inp-food-item").value.trim();
  if(!item)return;
  const food={item,cals:+document.getElementById("inp-food-cals").value||0,p:+document.getElementById("inp-food-p").value||0,c:+document.getElementById("inp-food-c").value||0,f:+document.getElementById("inp-food-f").value||0};
  MICROS.forEach(k=>{food[k]=+document.getElementById(`inp-${k}`).value||0;});
  const today=fmtToday();
  const nu=getOrInit(state.nutrition,selClientId,()=>[]);
  let day=nu.find(d=>d.date===today);
  if(!day){
    day={date:today,cals:0,protein:0,carbs:0,fat:0,micros:Object.fromEntries(MICROS.map(k=>[k,0])),meals:[{name:"Breakfast",foods:[]},{name:"Lunch",foods:[]},{name:"Dinner",foods:[]},{name:"Snacks",foods:[]}]};
    nu.unshift(day);
  }
  let mealObj=day.meals.find(m=>m.name===meal);
  if(!mealObj){mealObj={name:meal,foods:[]};day.meals.push(mealObj);}
  mealObj.foods.push(food);
  const allFoods=day.meals.flatMap(m=>m.foods);
  day.cals=allFoods.reduce((s,f)=>s+f.cals,0);
  day.protein=allFoods.reduce((s,f)=>s+f.p,0);
  day.carbs=allFoods.reduce((s,f)=>s+f.c,0);
  day.fat=allFoods.reduce((s,f)=>s+f.f,0);
  MICROS.forEach(k=>{day.micros[k]=allFoods.reduce((s,f)=>s+(f[k]||0),0);});
  ["inp-food-item","inp-food-cals","inp-food-p","inp-food-c","inp-food-f"].forEach(id=>{document.getElementById(id).value="";});
  MICROS.forEach(k=>{const el=document.getElementById(`inp-${k}`);if(el)el.value="";});
  closeModal("addFood");setTab("nutrition");
}

function openNutTargets(){
  const tgt=state.nutTargets[selClientId]||{cals:2000,protein:150,carbs:200,fat:65,...DEFAULT_MICRO_TGTS};
  ["cals","protein","carbs","fat"].forEach(k=>{const el=document.getElementById(`tgt-${k}`);if(el)el.value=tgt[k]||"";});
  MICROS.forEach(k=>{const el=document.getElementById(`tgt-${k}`);if(el)el.value=tgt[k]||DEFAULT_MICRO_TGTS[k]||"";});
  openModal("nutTargets");
}
function saveNutTargets(){
  if(!selClientId)return;
  const t={};
  ["cals","protein","carbs","fat"].forEach(k=>{t[k]=+document.getElementById(`tgt-${k}`).value||0;});
  MICROS.forEach(k=>{t[k]=+document.getElementById(`tgt-${k}`).value||DEFAULT_MICRO_TGTS[k];});
  state.nutTargets[selClientId]=t;
  closeModal("nutTargets");setTab(selTab);
}

function createProgram(){
  const name=document.getElementById("inp-prog-name").value.trim();
  if(!name||!selClientId)return;
  const prog={id:Date.now(),name,startMonth:document.getElementById("inp-prog-month").value,weeks:[]};
  getOrInit(state.programs,selClientId,()=>[]).push(prog);
  document.getElementById("inp-prog-name").value="";
  closeModal("addProgram");setTab("program");
}

// ─── CLOSE MODALS ON BACKDROP ─────────────────────────────────────────────────
document.querySelectorAll(".modal-overlay").forEach(overlay=>{
  overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.classList.remove("open");});
});

// ─── MONTH SELECT POPULATE ────────────────────────────────────────────────────
const sel=document.getElementById("inp-prog-month");
sel.innerHTML=`<option value="">Select month…</option>`+allMonths().map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join("");

// ─── WIRE UP BUTTONS ──────────────────────────────────────────────────────────
document.getElementById("btn-add-client").onclick=()=>openModal("addClient");
document.getElementById("btn-back-home").onclick=()=>{showScreen("home");renderHome();};
document.getElementById("btn-back-client").onclick=()=>{showScreen("client");setTab(selTab);};
document.getElementById("btn-save-program").onclick=saveProgram;

// ─── INIT ────────────────────────────────────────────────────────────────────
renderHome();
</script>

<!-- PWA SERVICE WORKER -->
<script>
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='pt-tracker-v1';
    const ASSETS=['/'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
